# Linux productie configuratie — gebruik host networking zodat echte client-IPs zichtbaar zijn.
# Op Linux heeft de container direct toegang tot het netwerk van de host,
# waardoor socket.remoteAddress het echte apparaat-IP teruggeeft (geen Docker NAT).
# Dit maakt automatische detectie van het maaier-IP mogelijk voor SSH map-upload.
#
# Gebruik op Linux:
#   docker compose -f docker-compose.linux.yml up -d
#
# Poorten (3000, 1883, 53, 80, 443) worden direct op de host gebonden.
# Zorg dat deze poorten vrij zijn en pas de firewall aan indien nodig.

services:
  opennova:
    image: rvbcrs/opennova:latest
    build: .
    container_name: opennova
    restart: unless-stopped
    network_mode: host      # Geen Docker NAT — echte client IPs zichtbaar
    environment:
      PORT: 80
      PROXY_MODE: ${PROXY_MODE:-local}
      DB_PATH: /data/novabot.db
      STORAGE_PATH: /data/storage
      FIRMWARE_PATH: /data/firmware
      TARGET_IP: ${TARGET_IP:?}
      DISABLE_DNS: ${DISABLE_DNS:-false}
      UPSTREAM_DNS: ${UPSTREAM_DNS:-8.8.8.8}
      EXTRA_DOMAINS: ${EXTRA_DOMAINS:-}
    volumes:
      - novabot-data:/data

volumes:
  novabot-data:
