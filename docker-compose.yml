# OpenNova Server — self-hosted Novabot cloud replacement
#
# Quick start:
#   docker compose up -d
#
# Admin: http://localhost/admin
# Provision devices: use the OpenNova app (iOS/Android) or bootstrap tool

services:
  opennova:
    image: rvbcrs/opennova:latest
    build: .
    container_name: opennova
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP (API + admin panel + mower connectivity check)
      - "443:443"     # HTTPS (required for Novabot app)
      - "1883:1883"   # MQTT broker
      # mDNS — used by custom-firmware mowers to auto-discover this server
      # on the LAN. Without this, mowers fall back to DNS rewrite of
      # mqtt.lfibot.com. See docs/guide/auto-discovery.md.
      - "5353:5353/udp"
      # - "53:53/udp" # DNS (optional — requires ENABLE_DNS + TARGET_IP)
    environment:
      # Timezone — must match the timezone used by the app when creating schedules
      TZ: ${TZ:-Europe/Amsterdam}
      PORT: 80
      DB_PATH: /data/novabot.db
      STORAGE_PATH: /data/storage
      FIRMWARE_PATH: /data/firmware
      ENABLE_TLS: "true"

      # Tijdelijk: log iedere succesvolle JWT auth zodat we wisselende tokens kunnen tracen
      AUTH_DEBUG: "1"

      # Optional: enable web dashboard (default: disabled)
      ENABLE_DASHBOARD: "true"

      # Your server's LAN IP (for firmware download URLs, TLS cert SAN + DNS)
      TARGET_IP: 192.168.0.222

      # Optional: DNS redirect for Novabot app (requires TARGET_IP)
      # ENABLE_DNS: "true"
      # UPSTREAM_DNS: 8.8.8.8

      # Home Assistant MQTT bridge — auto-discover mowers + map images
      HA_MQTT_HOST: ${HA_MQTT_HOST:-}
      HA_MQTT_PORT: ${HA_MQTT_PORT:-1883}
      HA_MQTT_USER: ${HA_MQTT_USER:-}
      HA_MQTT_PASS: ${HA_MQTT_PASS:-}

      # Public base URL of the OpenNova server — needed so HA can fetch
      # the rendered map SVG via image entity. Without this the bridge
      # still publishes sensors but no image entity is discovered.
      RENDER_BASE_URL: ${RENDER_BASE_URL:-http://192.168.0.222}

      # Min interval (ms) between map image republishes. Default 15s
      # keeps HA responsive without spamming the broker.
      HA_MAP_THROTTLE_MS: ${HA_MAP_THROTTLE_MS:-15000}

      # ntfy.sh push notifications — set NTFY_TOPIC in .env to enable.
      # Topics are unauthenticated; pick something long and random.
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_URL: ${NTFY_URL:-https://ntfy.sh}
      NTFY_PRIORITY: ${NTFY_PRIORITY:-}

      # Optional: HA webhook trigger URL (full event JSON POSTed)
      HA_WEBHOOK_URL: ${HA_WEBHOOK_URL:-}

      # Battery % crossing point for the low_battery event
      LOW_BATTERY_THRESHOLD: ${LOW_BATTERY_THRESHOLD:-20}

      # Remote support tunnel — built-in. Agent dials wss://opennova.ramonvanbruggen.nl
      # automatically when the user toggles support ON via the admin UI (writes
      # /data/.remote_support_enabled). First connect for a given SN records the
      # agent's auto-generated token fingerprint (TOFU); reconnects must match.
      # Ramon's relay instance is the only place that sets RELAY_ENABLED=true.
      REMOTE_SUPPORT_RELAY_ENABLED: "${REMOTE_SUPPORT_RELAY_ENABLED:-false}"
      # Optional: override the relay URL (dev / staging only).
      REMOTE_SUPPORT_RELAY_URL: "${REMOTE_SUPPORT_RELAY_URL:-}"
    volumes:
      - ./data:/data
