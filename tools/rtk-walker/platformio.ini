; RTK Walker — ESP32-S3-N16R8 + Quectel LC29HDA RTK GNSS
;
; Build: pio run -e esp32s3-walker -t upload
; Monitor: pio device monitor -b 115200

[env:esp32s3-walker]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino

; N16R8 = 16 MB flash + 8 MB PSRAM (octal)
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

; Serial over native USB-CDC so the same USB-C cable handles upload + monitor.
build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D CORE_DEBUG_LEVEL=0

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    bblanchon/ArduinoJson@^7.1.0

board_build.filesystem = littlefs

; Optional: serve the live-status HTML from LittleFS via `pio run -t uploadfs`.
; The default build embeds it from src/index_html.h so no separate uploadfs
; step is strictly required for first-time flashing.
