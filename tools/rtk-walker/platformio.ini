; RTK Walker — ESP32-S3 + Quectel LC29HDA RTK GNSS
;
; Two targets:
;   esp32s3-walker     — bare ESP32-S3-N16R8, web-only UI (phone is the screen)
;   jc3248w535-walker  — ESP32-S3 with the 3.5" JC3248W535EN TFT, standalone
;                        UI on-device + the same web UI in parallel
;
; Build:   pio run -e <env> -t upload
; Monitor: pio device monitor -b 115200

; ── Shared base ──────────────────────────────────────────────────────────────
[walker_common]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    bblanchon/ArduinoJson@^7.1.0
board_build.filesystem = littlefs
; Stamp every build with a YYYY.MMDD.HHMM version string via -DFIRMWARE_VERSION.
; Consumed by walker_ota.cpp for the OTA manifest comparison.
extra_scripts = pre:scripts/inject_version.py

; ── N16R8 dev board, no display, web UI only ─────────────────────────────────
[env:esp32s3-walker]
extends = walker_common
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1

; N16R8 = 16 MB flash + 8 MB PSRAM (octal)
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D CORE_DEBUG_LEVEL=0
    ; ── E22-900T22S LoRa receiver for RTK relay from charger ───────────
    ; All four pins are on the JC3248W535 P2 "Extended IO" header (free GPIOs):
    ; IO16/IO15 = UART2 RX/TX, IO7/IO14 = M0/M1 mode pins. Avoids IO11 (SD MOSI),
    ; IO44 (U0RXD debug), IO5 (BAT_ADC), IO17/IO18 (LC29HDA), IO46 (strap).
    -D LORA_PRESENT
    -D LORA_RX_PIN=16
    -D LORA_TX_PIN=15
    -D LORA_M0_PIN=7
    -D LORA_M1_PIN=14

; Exclude the TFT/LVGL code from this build so the headless target stays small.
build_src_filter = +<*> -<tft/>

; ── JC3248W535EN — 3.5" 320x480 AXS15231B QSPI + I2C touch + LVGL ────────────
[env:jc3248w535-walker]
extends = walker_common
; Same toolchain the esp32-tool firmware uses for this board — needed for the
; QSPI/esp_lvgl_port stack that the driver files depend on.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_mode = dio
; default_16MB.csv has dual OTA app slots (app0 + app1) — required so the
; walker_ota module can apply firmware updates at runtime. huge_app.csv (single
; slot, the old default) cannot do OTA.
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

lib_deps =
    ${walker_common.lib_deps}
    lvgl/lvgl@^8.4.0

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D HAS_TFT_DISPLAY
    -D JC3248W535
    -D LV_CONF_INCLUDE_SIMPLE
    -I src
    -I src/tft
    -I src/tft/drivers
    ; JC3248W535EN pin map (matches firmware/esp32-tool platformio.ini)
    -D LCD_CS=45
    -D LCD_SCK=47
    -D LCD_SDA0=21
    -D LCD_SDA1=48
    -D LCD_SDA2=40
    -D LCD_SDA3=39
    -D LCD_TE=38
    -D LCD_RST=-1
    -D LCD_BL=1
    -D TOUCH_SDA=4
    -D TOUCH_SCL=8
    -D TOUCH_INT=3
    -D TOUCH_RST=-1
    ; Battery divider — JC3248W535 schematic: BAT --[R26 33K]-- ADC --[R27 100K]-- GND
    ; so V_adc = V_bat * 100/(33+100). GPIO 5 = ADC1_CH4, safe with WiFi active.
    -D BAT_ADC=5
    ; ── E22-900T22S LoRa receiver for RTK relay from charger ───────────
    ; Same free GPIOs as the JC3248W535 target (P2 Extended IO header) so a
    ; single wiring diagram covers both boards. IO16/IO15 = UART2 RX/TX,
    ; IO7/IO14 = M0/M1 mode pins.
    -D LORA_PRESENT
    -D LORA_RX_PIN=16
    -D LORA_TX_PIN=15
    -D LORA_M0_PIN=7
    -D LORA_M1_PIN=14
