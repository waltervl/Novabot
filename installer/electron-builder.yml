# electron-builder configuration for the OpenNova Installer.
#
# SIGNING / NOTARIZATION (deferred):
#   This config builds UNSIGNED artifacts by default for internal use. Sign
#   before any wide release. All credentials come from environment variables
#   and are NEVER committed to the repo:
#     - Windows/macOS code signing : CSC_LINK, CSC_KEY_PASSWORD
#     - macOS notarization         : APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#   When those env vars are absent, electron-builder skips signing/notarization.
#
# NATIVE DEPS: xz decompression uses `xz-decompress` (WASM, base64-inlined, no
#   .node module) and the image patch uses macOS `mtools`. The SD write uses a
#   tiny bundled `fdwrite` helper (compiled from native/fdwrite.c) that drives
#   `authopen -stdoutpipe` for full-speed writes without Full Disk Access. The
#   asarUnpack globs below are a safety net should an npm native dep be added.

appId: nl.ramonvanbruggen.opennova.installer
productName: OpenNova Installer

directories:
  output: release
  buildResources: build

# Only the built output + production deps are shipped. Source/tests are excluded
# (only dist/ runs at runtime); electron-builder prunes to production deps itself.
files:
  - "dist/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!**/*.map"
  - "!**/test/**"
  - "!**/__tests__/**"
  - "!src/**"

# Safety net: if a native module is ever added, unpack it from the asar so it can
# be dlopen()'d at runtime. Currently nothing matches these (no native deps).
asarUnpack:
  - "node_modules/**/*.node"
  - "node_modules/**/prebuilds/**"

# Bundle the mtools binaries used to write the FAT boot partition. They land in
# the app's resources dir (`process.resourcesPath/mtools/<platform>-<arch>/`),
# which `imagePatcher.ts` resolves at runtime. All platforms' binaries are tiny
# (~200 KB) so we ship them together rather than per-target-filtering.
extraResources:
  - from: vendor/mtools
    to: mtools
  # The fast-flash helper (macOS); resolved at runtime via process.resourcesPath.
  - from: vendor/fdwrite
    to: fdwrite

mac:
  target: dmg
  category: public.app-category.utilities
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization is env-gated: enable by setting APPLE_ID,
  # APPLE_APP_SPECIFIC_PASSWORD and APPLE_TEAM_ID in the build environment.
  # notarize:
  #   teamId: ${env.APPLE_TEAM_ID}

win:
  target: nsis

# The app builds an image file (no raw-disk writes), so it does not need admin
# rights to run. (Note: the image patcher is currently macOS-only.)
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target: AppImage
  category: Utility
