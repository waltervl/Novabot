<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenNova Installer</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash. Light is the
      // default (the :root variables); only dark needs the attribute set early.
      try {
        if (localStorage.getItem('opennova-installer-theme') === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
