name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Tell us what you want and why. The more concrete the use-case,
        the easier it is to build the right thing.

  - type: checkboxes
    id: surfaces
    attributes:
      label: Which surface(s) does this affect?
      description: Select all that apply. Used for auto-labeling so triage can filter quickly.
      options:
        - label: Web dashboard
        - label: OpenNova mobile app (Android/iOS)
        - label: Novabot stock app (Flutter, third-party)
        - label: Admin page
        - label: Server backend (MQTT, DB, API)

  - type: dropdown
    id: app
    attributes:
      label: Which app / surface does this affect?
      options:
        - OpenNova app (Android / iOS)
        - Web dashboard
        - OpenNova server / cloud-API
        - Mower firmware (custom)
        - Setup wizard / bootstrap
        - Home Assistant integration
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: server_version
    attributes:
      label: Current OpenNova release you are running
      description: So we know which baseline to compare against.
      placeholder: "e.g. v2026.0429.1314 (or 'not running yet')"

  - type: textarea
    id: problem
    attributes:
      label: Problem / use-case
      description: What are you trying to achieve? What's the pain today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Mock-ups welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or other approaches you weighed.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links, related issues, prior art.
