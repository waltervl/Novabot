name: Build Windows Installer

# Builds the OpenNova Installer Windows .exe. We cannot cross-build it from
# macOS (the native `drivelist` module has no Windows prebuild and must be
# compiled with MSVC, and NSIS packaging wants a Windows/Wine host), so this runs
# on a real windows-latest runner and uploads the installer as an artifact you
# can download and test.
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'installer/**'
      - '.github/workflows/build-installer-windows.yml'

jobs:
  build:
    # windows-2022 ships Visual Studio 2022, which drivelist's bundled
    # node-gyp@9 can detect (windows-latest moved to a newer VS it can't parse).
    runs-on: windows-2022
    defaults:
      run:
        working-directory: installer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # drivelist's bundled node-gyp@9 uses gyp that imports distutils, removed in
      # Python 3.12. Pin 3.11 so the native build works.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Compiles drivelist with the VS Build Tools preinstalled on the runner,
      # then postinstall rebuilds native deps for the Electron ABI.
      - name: Install dependencies
        run: npm ci
        env:
          PYTHON: python

      # mtools (mcopy.exe/mtype.exe) patches the FAT boot partition. Best-effort:
      # try a direct SourceForge mirror (the normal URL is now behind a Cloudflare
      # challenge), then MSYS2. If neither works the build still proceeds without
      # bundled mtools - image building/patching won't work on Windows then, but
      # the flasher can still be tested via "reuse an existing image".
      - name: Fetch win32 mtools (best effort)
        shell: pwsh
        run: |
          $dir = 'vendor\mtools\win32-x64'
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $ok = $false
          foreach ($sfhost in @('master.dl.sourceforge.net','phoenixnap.dl.sourceforge.net','versaweb.dl.sourceforge.net')) {
            if ($ok) { break }
            try {
              $url = "https://$sfhost/project/ezwinports/mtools-4.0.18-w32-bin.zip"
              $zip = "$env:RUNNER_TEMP\mt.zip"
              Invoke-WebRequest -Uri $url -OutFile $zip -UserAgent 'Mozilla/5.0' -MaximumRedirection 10 -TimeoutSec 60
              $h = [System.IO.File]::ReadAllBytes($zip)[0..1]
              if ($h[0] -eq 0x50 -and $h[1] -eq 0x4B) {
                $out = "$env:RUNNER_TEMP\mt"
                Expand-Archive -Path $zip -DestinationPath $out -Force
                $mc = Get-ChildItem $out -Recurse -Filter mcopy.exe | Select-Object -First 1
                $mt = Get-ChildItem $out -Recurse -Filter mtype.exe | Select-Object -First 1
                if ($mc) {
                  Copy-Item $mc.FullName "$dir\mcopy.exe"
                  if ($mt) { Copy-Item $mt.FullName "$dir\mtype.exe" } else { Copy-Item $mc.FullName "$dir\mtype.exe" }
                  Get-ChildItem $out -Recurse -Filter *.dll | ForEach-Object { Copy-Item $_.FullName "$dir\" }
                  $ok = $true
                  Write-Host "got mtools from $sfhost"
                }
              }
            } catch { Write-Host "mirror $sfhost failed: $_" }
          }
          if (-not $ok) {
            try {
              & C:\msys64\usr\bin\bash.exe -lc "pacman -Sy --noconfirm" 2>&1 | Out-Host
              & C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm --needed mtools" 2>&1 | Out-Host
              if (Test-Path C:\msys64\usr\bin\mcopy.exe) {
                Copy-Item C:\msys64\usr\bin\mcopy.exe "$dir\mcopy.exe"
                Copy-Item C:\msys64\usr\bin\mtype.exe "$dir\mtype.exe"
                $deps = & C:\msys64\usr\bin\bash.exe -lc "ldd /usr/bin/mcopy.exe /usr/bin/mtype.exe | grep -oE 'msys-[^ ]+\.dll' | sort -u"
                foreach ($d in $deps) { Copy-Item "C:\msys64\usr\bin\$d" "$dir\" }
                $ok = $true
                Write-Host 'got mtools from MSYS2'
              }
            } catch { Write-Host "MSYS2 failed: $_" }
          }
          if ($ok) { Get-ChildItem $dir; Write-Host '::notice::win32 mtools bundled' }
          else { Write-Host '::warning::win32 mtools NOT bundled - on Windows build the image elsewhere and use Reuse-existing-image to test the flasher' }
          # Best-effort: never fail the build over mtools (reset native exit code).
          $global:LASTEXITCODE = 0
          exit 0

      # build:helper is a no-op off macOS; build:main + build:renderer + nsis run.
      - name: Build installer
        run: npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: opennova-installer-windows
          path: installer/release/*.exe
          if-no-files-found: error
