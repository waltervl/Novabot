name: Build Windows Installer

# Builds the OpenNova Installer Windows .exe. We cannot cross-build it from
# macOS (the native `drivelist` module has no Windows prebuild and must be
# compiled with MSVC, and NSIS packaging wants a Windows/Wine host), so this runs
# on a real windows-latest runner and uploads the installer as an artifact you
# can download and test.
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'installer/**'
      - '.github/workflows/build-installer-windows.yml'

jobs:
  build:
    # windows-2022 ships Visual Studio 2022, which drivelist's bundled
    # node-gyp@9 can detect (windows-latest moved to a newer VS it can't parse).
    runs-on: windows-2022
    defaults:
      run:
        working-directory: installer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # drivelist's bundled node-gyp@9 uses gyp that imports distutils, removed in
      # Python 3.12. Pin 3.11 so the native build works.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Compiles drivelist with the VS Build Tools preinstalled on the runner,
      # then postinstall rebuilds native deps for the Electron ABI.
      - name: Install dependencies
        run: npm ci
        env:
          PYTHON: python

      # win32 mtools (mcopy.exe/mtype.exe) is vendored in the repo
      # (vendor/mtools/win32-x64/, a static mingw build) and bundled by
      # electron-builder, so there is no fetch step here.

      # build:helper is a no-op off macOS; build:main + build:renderer + nsis run.
      - name: Build installer
        run: npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: opennova-installer-windows
          path: installer/release/*.exe
          if-no-files-found: error
